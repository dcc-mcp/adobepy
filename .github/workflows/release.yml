name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      publish_to_pypi:
        description: "Publish the selected ref to PyPI. Leave false for a build-only dry run."
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  python-package:
    name: Build Python package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - run: python scripts/check_native_abi3_config.py
      - run: python scripts/check_wheel_compat.py dist
      - run: python scripts/smoke_wheel_install.py dist
      - uses: actions/upload-artifact@v4
        with:
          name: adobepy-python-dist
          path: dist/*

  pypi:
    name: Publish Python package
    runs-on: ubuntu-latest
    needs: python-package
    if: github.event_name == 'release' || inputs.publish_to_pypi == true
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: adobepy-python-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  windows-package:
    name: Build Windows package artifact
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: python -m pip install --upgrade "coverage[toml]" setuptools wheel
      - name: Package
        shell: pwsh
        run: ./scripts/package-release.ps1
      - name: Install smoke test
        shell: pwsh
        run: |
          $zip = Get-ChildItem dist -Filter "adobepy-*-windows-x64.zip" | Select-Object -First 1
          if (-not $zip) { throw "package zip was not created" }
          ./scripts/smoke_install.ps1 -ZipPath $zip.FullName
      - uses: actions/upload-artifact@v4
        with:
          name: adobepy-windows-x64
          path: |
            dist/*.zip
            dist/*.zip.sha256
      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        run: gh release upload ${{ github.event.release.tag_name }} dist/*.zip dist/*.zip.sha256 --clobber
        env:
          GH_TOKEN: ${{ github.token }}
