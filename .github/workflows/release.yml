name: Release

# Manual release entry point. Also triggered by `release: published` when
# a release is manually created from the GitHub UI.
# Automated releases are handled by release-please.yml (push to main).
on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      publish_to_pypi:
        description: "Publish the selected ref to PyPI. Leave false for a build-only dry run."
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  python-package:
    name: Build Python package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - run: python scripts/check_native_abi3_config.py
      - run: python scripts/check_wheel_compat.py dist
      - run: python scripts/smoke_wheel_install.py dist
      - uses: actions/upload-artifact@v4
        with:
          name: adobepy-python-dist
          path: dist/*

  pypi:
    name: Publish Python package
    runs-on: ubuntu-latest
    needs: python-package
    if: github.event_name == 'release' || inputs.publish_to_pypi == true
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: adobepy-python-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  windows-package:
    name: Build Windows package artifact
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: python -m pip install --upgrade "coverage[toml]" setuptools wheel
      - name: Package
        shell: pwsh
        run: ./scripts/package-release.ps1
      - name: Install smoke test
        shell: pwsh
        run: |
          $zip = Get-ChildItem dist -Filter "adobepy-*-windows-x64.zip" | Select-Object -First 1
          if (-not $zip) { throw "package zip was not created" }
          ./scripts/smoke_install.ps1 -ZipPath $zip.FullName
      - uses: actions/upload-artifact@v4
        with:
          name: adobepy-windows-x64
          path: |
            dist/*.zip
            dist/*.zip.sha256
      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        shell: pwsh
        run: |
          $assets = @(Get-ChildItem "dist/*" -Include "*.zip","*.zip.sha256" | ForEach-Object { $_.FullName })
          if ($assets.Count -eq 0) { throw "No release assets found in dist/" }
          gh release upload ${{ github.event.release.tag_name }} $assets --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  windows-standalone-package:
    name: Build Windows standalone interpreter (PyOxidizer)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build adobepy wheel
        shell: pwsh
        run: |
          python -m pip install --upgrade build wheel
          python -m build --wheel --outdir dist
      - name: Build standalone interpreter with PyOxidizer
        shell: pwsh
        run: |
          python -m pip install pyoxidizer
          $wheel = (Get-ChildItem dist -Filter "adobepy-*.whl" | Select-Object -First 1).FullName
          if (-not $wheel) { throw "adobepy wheel was not built" }
          pyoxidizer build --path pyadobe --var ADOBEPY_WHEEL "$wheel"
      - name: Locate build output and package
        shell: pwsh
        run: |
          $buildDir = Get-ChildItem build/*/release/install -Directory | Select-Object -First 1
          if (-not $buildDir) { throw "PyOxidizer build output not found" }
          echo "STANDALONE_BUILD_DIR=$($buildDir.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding ASCII
          $runtimeId = "windows-x64"
          $version = (Get-Content -Raw package.json | ConvertFrom-Json).version
          $packageName = "adobepy-standalone-$version-$runtimeId"
          $distDir = Join-Path (Resolve-Path ".") "dist"
          New-Item -ItemType Directory -Force -Path $distDir | Out-Null
          Compress-Archive -Path "$($buildDir.FullName)/*" -DestinationPath (Join-Path $distDir "$packageName.zip") -Force
          $hash = -join ((Get-FileHash (Join-Path $distDir "$packageName.zip") -Algorithm SHA256).Hash | ForEach-Object { $_.ToLower() })
          "$hash  $packageName.zip" | Out-File -FilePath (Join-Path $distDir "$packageName.zip.sha256") -Encoding ASCII
      - name: Smoke test standalone interpreter
        shell: pwsh
        run: |
          $exe = Join-Path $env:STANDALONE_BUILD_DIR "adobepy-python"
          & $exe --version
          & $exe -c "from adobe.photoshop import Photoshop; print('standalone smoke OK')"
          if ($LASTEXITCODE -ne 0) { throw "standalone interpreter smoke failed" }
      - uses: actions/upload-artifact@v4
        with:
          name: adobepy-standalone-windows-x64
          path: |
            dist/adobepy-standalone-*.zip
            dist/adobepy-standalone-*.zip.sha256
      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        shell: pwsh
        run: |
          $assets = @(Get-ChildItem "dist/*" -Include "adobepy-standalone-*.zip","adobepy-standalone-*.zip.sha256" | ForEach-Object { $_.FullName })
          if ($assets.Count -eq 0) { throw "No standalone release assets found in dist/" }
          gh release upload ${{ github.event.release.tag_name }} $assets --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  macos-standalone-package:
    name: Build macOS standalone interpreter (PyOxidizer)
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build adobepy wheel
        shell: bash
        run: |
          python3 -m pip install --upgrade build wheel
          python3 -m build --wheel --outdir dist
      - name: Build standalone interpreter with PyOxidizer
        shell: bash
        run: |
          python3 -m pip install pyoxidizer
          wheel=$(ls dist/adobepy-*.whl 2>/dev/null | head -1)
          if [ -z "$wheel" ]; then echo "adobepy wheel was not built"; exit 1; fi
          wheel_abs="$(cd "$(dirname "$wheel")" && pwd)/$(basename "$wheel")"
          pyoxidizer build --path pyadobe --var ADOBEPY_WHEEL "$wheel_abs"
      - name: Locate build output and package
        shell: bash
        run: |
          build_dir=$(ls -d build/*/release/install 2>/dev/null | head -1)
          if [ -z "$build_dir" ]; then echo "PyOxidizer build output not found"; exit 1; fi
          echo "STANDALONE_BUILD_DIR=$build_dir" >> $GITHUB_ENV
          arch="$(uname -m)"
          if [ "$arch" = "arm64" ]; then runtime_id="macos-arm64"; else runtime_id="macos-x64"; fi
          version=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")
          package_name="adobepy-standalone-$version-$runtime_id"
          dist_dir="${{ github.workspace }}/dist"
          mkdir -p "$dist_dir"
          (cd "$build_dir" && zip -r "$dist_dir/$package_name.zip" .)
          hash=$(sha256sum "$dist_dir/$package_name.zip" | cut -d' ' -f1)
          echo "$hash  $package_name.zip" > "$dist_dir/$package_name.zip.sha256"
      - name: Smoke test standalone interpreter
        shell: bash
        run: |
          "$STANDALONE_BUILD_DIR/adobepy-python" --version
          "$STANDALONE_BUILD_DIR/adobepy-python" -c "from adobe.photoshop import Photoshop; print('standalone smoke OK')"
      - uses: actions/upload-artifact@v4
        with:
          name: adobepy-standalone-macos
          path: |
            dist/adobepy-standalone-*.zip
            dist/adobepy-standalone-*.zip.sha256
      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        shell: bash
        run: |
          assets=$(ls dist/adobepy-standalone-*.zip dist/adobepy-standalone-*.zip.sha256 2>/dev/null | tr '\n' ' ')
          if [ -z "$assets" ]; then echo "No standalone release assets found in dist/"; exit 1; fi
          gh release upload ${{ github.event.release.tag_name }} $assets --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  linux-standalone-package:
    name: Build Linux standalone interpreter (PyOxidizer)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build adobepy wheel
        shell: bash
        run: |
          python3 -m pip install --upgrade build wheel
          python3 -m build --wheel --outdir dist
      - name: Build standalone interpreter with PyOxidizer
        shell: bash
        run: |
          python3 -m pip install pyoxidizer
          wheel=$(ls dist/adobepy-*.whl 2>/dev/null | head -1)
          if [ -z "$wheel" ]; then echo "adobepy wheel was not built"; exit 1; fi
          wheel_abs="$(cd "$(dirname "$wheel")" && pwd)/$(basename "$wheel")"
          pyoxidizer build --path pyadobe --var ADOBEPY_WHEEL "$wheel_abs"
      - name: Locate build output and package
        shell: bash
        run: |
          build_dir=$(ls -d build/*/release/install 2>/dev/null | head -1)
          if [ -z "$build_dir" ]; then echo "PyOxidizer build output not found"; exit 1; fi
          echo "STANDALONE_BUILD_DIR=$build_dir" >> $GITHUB_ENV
          arch="$(uname -m)"
          if [ "$arch" = "aarch64" ]; then runtime_id="linux-arm64"; else runtime_id="linux-x64"; fi
          version=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")
          package_name="adobepy-standalone-$version-$runtime_id"
          dist_dir="${{ github.workspace }}/dist"
          mkdir -p "$dist_dir"
          (cd "$build_dir" && zip -r "$dist_dir/$package_name.zip" .)
          hash=$(sha256sum "$dist_dir/$package_name.zip" | cut -d' ' -f1)
          echo "$hash  $package_name.zip" > "$dist_dir/$package_name.zip.sha256"
      - name: Smoke test standalone interpreter
        shell: bash
        run: |
          "$STANDALONE_BUILD_DIR/adobepy-python" --version
          "$STANDALONE_BUILD_DIR/adobepy-python" -c "from adobe.photoshop import Photoshop; print('standalone smoke OK')"
      - uses: actions/upload-artifact@v4
        with:
          name: adobepy-standalone-linux
          path: |
            dist/adobepy-standalone-*.zip
            dist/adobepy-standalone-*.zip.sha256
      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        shell: bash
        run: |
          assets=$(ls dist/adobepy-standalone-*.zip dist/adobepy-standalone-*.zip.sha256 2>/dev/null | tr '\n' ' ')
          if [ -z "$assets" ]; then echo "No standalone release assets found in dist/"; exit 1; fi
          gh release upload ${{ github.event.release.tag_name }} $assets --clobber
        env:
          GH_TOKEN: ${{ github.token }}
