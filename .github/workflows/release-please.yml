name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # Use a PAT (RELEASE_PLEASE_TOKEN) to trigger CI workflows on
          # the created PR. With GITHUB_TOKEN, GitHub blocks both
          # pull_request and pull_request_target events, so release-please
          # PRs would have no CI status checks.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json

  python-package:
    name: Build Python package
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build twine
      - run: python -m build
      - run: python -m twine check dist/*
      - run: python scripts/check_native_abi3_config.py
      - run: python scripts/check_wheel_compat.py dist
      - run: python scripts/smoke_wheel_install.py dist
      - uses: actions/upload-artifact@v4
        with:
          name: adobepy-python-dist
          path: dist/*

  pypi:
    name: Publish to PyPI
    needs:
      - release-please
      - python-package
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: adobepy-python-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  windows-package:
    name: Build Windows package and upload to release
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: python -m pip install --upgrade "coverage[toml]" setuptools wheel
      - name: Package
        shell: pwsh
        run: ./scripts/package-release.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: adobepy-windows-x64
          path: |
            dist/*.zip
            dist/*.zip.sha256
      - name: Upload to GitHub Release
        shell: pwsh
        run: |
          $assets = @(Get-ChildItem "dist/*" -Include "*.zip","*.zip.sha256" | ForEach-Object { $_.FullName })
          if ($assets.Count -eq 0) { throw "No release assets found in dist/" }
          $tag = "${{ needs.release-please.outputs.tag_name }}"
          gh release upload $tag $assets --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
